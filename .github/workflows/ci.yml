name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-gates:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Test coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Verify bundle size
        run: npm run verify:bundle-size

      - name: Typecheck consumer fixture
        run: npm run typecheck:consumer

      - name: Verify package contents
        run: npm run verify:pack

      - name: Verify runnable examples
        run: npm run verify:examples

  playground-build:
    name: Playground build (Node 22.x)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build playground
        run: npm run build:playground
