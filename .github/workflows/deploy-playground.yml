name: Deploy playground to GitHub Pages

on:
  push:
    branches:
      - main
    # Only redeploy when something that affects the built playground changes.
    # Docs- or test-only commits (e.g. a CLAUDE.md edit) are intentionally
    # skipped so they don't queue a redundant npm ci + build + Pages deploy.
    # Use the workflow_dispatch trigger below to deploy manually if needed.
    paths:
      - 'src/**'
      - 'index.html'
      - 'vite.playground.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-playground.yml'
      # ...but not the test suite or in-tree docs, which never reach the site.
      - '!src/__tests__/**'
      - '!src/**/*.test.ts'
      - '!src/**/*.test.tsx'
      - '!src/**/*.spec.ts'
      - '!src/**/*.spec.tsx'
      - '!**/*.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight deploy at a time; queue (don't cancel) so each push lands.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build playground
        run: npm run build:playground

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-playground

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
